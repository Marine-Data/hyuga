<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 SARAILLON ULTIME</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2b3a55;
      --primary-soft: #5b6c8a;
      --primary-light: #93a6c2;
      --bg: #f8fafc;
      --bg-raised: #ffffff;
      --bg-sunken: #eaf2fb;
      --border: #aecbe8;
      --accent-purple: #9933ff;
      --accent-pink: #e07a96;
      --accent-cyan: #6fb8b0;
      --accent-gold: #e3b94f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--primary);
    }

    .app-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 22px;
      height: 100vh;
      background: var(--primary);
      z-index: 100;
      border-right: 2px solid var(--accent-purple);
      transition: width 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      width: 280px;
      padding: 20px 15px;
      overflow-y: auto;
      gap: 10px;
    }

    .sidebar-toggle {
      width: 22px;
      height: 50px;
      border: none;
      background: var(--accent-purple);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border-radius: 0 8px 8px 0;
    }

    .sidebar.open .sidebar-toggle { display: none; }
    .sidebar-content { display: none; flex-direction: column; gap: 10px; width: 100%; }
    .sidebar.open .sidebar-content { display: flex; }

    .sidebar-link {
      background: var(--bg-raised);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      text-align: center;
      width: 100%;
    }

    .sidebar-link:hover, .sidebar-link.active {
      background: var(--accent-purple);
      color: white;
      border-color: var(--accent-purple);
    }

    /* MAIN */
    .main-content {
      margin-left: 22px;
      flex: 1;
      padding-bottom: 100px;
    }

    .sidebar.open ~ .main-content { margin-left: 280px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: linear-gradient(135deg, var(--bg-raised) 0%, var(--bg-sunken) 100%);
      border-bottom: 2px solid var(--border);
      padding: 16px 20px;
    }

    .header-logo h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 16px;
      color: var(--primary);
      text-shadow: 2px 2px 0 var(--accent-gold);
      margin: 0;
    }

    /* TABS */
    .tab-nav {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-raised);
      position: sticky;
      top: 60px;
      z-index: 39;
      overflow-x: auto;
    }

    .tab-btn {
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      background: var(--bg-raised);
      color: var(--primary-soft);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    /* CONTENT */
    .content {
      max-width: 900px;
      margin: 0 auto;
    }

    .day-card {
      background: var(--bg-raised);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .day-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 16px;
      color: var(--primary);
      text-shadow: 1px 1px 0 var(--accent-gold);
      margin-bottom: 16px;
    }

    .activity {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .activity:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .activity-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .info-item {
      background: var(--bg-sunken);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 12px;
    }

    .info-label {
      font-size: 10px;
      color: var(--primary-light);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      line-height: 1.3;
    }

    .link-btn {
      color: var(--accent-purple);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
    }

    .link-btn:hover { text-decoration: underline; }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.2s ease;
      flex: 1;
      text-align: center;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-purple);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(153, 51, 255, 0.3);
    }

    /* CORVEES */
    .roulette-container {
      text-align: center;
      padding: 20px;
    }

    .day-selector {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      background: var(--bg-raised);
      position: sticky;
      top: 60px;
      z-index: 39;
    }

    .day-btn {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      background: var(--bg-raised);
      color: var(--primary-soft);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }

    .day-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .spin-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent-purple);
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-gold));
      color: white;
      font-size: 40px;
      font-weight: 700;
      cursor: pointer;
      margin: 20px auto;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(153, 51, 255, 0.3);
    }

    .spin-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(153, 51, 255, 0.5);
    }

    .spin-btn:active {
      transform: scale(0.95);
    }

    .chores-list {
      background: var(--bg-raised);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .chore-item {
      background: var(--bg-sunken);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chore-emoji { font-size: 24px; }

    .chore-info {
      flex: 1;
    }

    .chore-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .chore-person {
      font-size: 12px;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .empty-msg {
      text-align: center;
      color: var(--primary-light);
      padding: 40px 20px;
    }

    /* DEEZER */
    .deezer-tab {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 50px;
      background: var(--accent-cyan);
      border: none;
      border-radius: 8px 0 0 8px;
      color: white;
      cursor: pointer;
      z-index: 99;
      font-size: 14px;
      box-shadow: -2px 0 6px rgba(0,0,0,0.15);
    }

    .deezer-panel {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%) translateX(110%);
      width: min(95vw, 360px);
      max-height: 85vh;
      background: var(--bg-raised);
      border: 1.5px solid var(--border);
      border-radius: 12px 0 0 12px;
      z-index: 99;
      transition: transform 0.3s ease;
      box-shadow: -3px 0 12px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .deezer-panel.open { transform: translateY(-50%) translateX(0); }

    .deezer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-sunken);
      flex-shrink: 0;
    }

    .deezer-header h3 {
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: var(--primary);
      margin: 0;
    }

    .deezer-close {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      color: var(--primary);
    }

    .deezer-content {
      flex: 1;
      overflow-y: auto;
    }

    .deezer-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .challenge-tab-content {
      display: none;
    }

    .challenge-tab-content.active {
      display: block;
    }

    @media (max-width: 768px) {
      .info-row { grid-template-columns: 1fr; }
      .sidebar.open { width: 85vw; max-width: 280px; }
      .spin-btn { width: 100px; height: 100px; font-size: 30px; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-content">
      <button class="sidebar-link active" onclick="switchTab('planning', 0)">📅 Planning</button>
      <button class="sidebar-link" onclick="switchTab('corvees', 1)">🎲 Corvées</button>
      <button class="sidebar-link" onclick="switchTab('surprises', 2)">🎉 Surprises</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- HEADER -->
    <div class="app-header">
      <div class="header-logo">
        <h1>🎮 SARAILLON</h1>
      </div>
    </div>

    <!-- PLANNING TAB -->
    <div id="planning" class="tab-content active">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('planning', 0)">📅 Planning</button>
        <button class="tab-btn" onclick="switchTab('corvees', 1)">🎲 Corvées</button>
        <button class="tab-btn" onclick="switchTab('challenges', 2)">🎯 Challenges</button>
        <button class="tab-btn" onclick="switchTab('surprises', 3)">🎉 Surprises</button>
      </div>
      <div class="content" id="planning-content"></div>
    </div>

    <!-- CORVEES TAB -->
    <div id="corvees" class="tab-content">
      <div class="day-selector" id="day-selector"></div>
      <div class="roulette-container">
        <button class="spin-btn" onclick="spinRoulette()">🎡</button>
        <p style="color: var(--primary-light); margin-top: 10px;">Appuie sur la roulette pour voir les corvées du jour!</p>
      </div>
      <div class="chores-list" id="chores-display"></div>
    </div>

    <!-- SURPRISES TAB -->
    <div id="surprises" class="tab-content">
      <div class="content">
        <div style="background: var(--bg-raised); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px;">
          <h2 style="font-family: 'Press Start 2P', cursive; font-size: 14px; color: var(--primary); margin-bottom: 16px;">🤫 Code secret</h2>
          <input type="password" id="surprise-code" placeholder="Écris le code..." style="width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 12px;">
          <button class="btn btn-primary" onclick="revealSurprise()" style="width: 100%;">🎉 DÉVERROUILLER</button>
        </div>
        <div id="surprise-content" style="margin-top: 20px;"></div>
      </div>
    </div>

    <!-- CHALLENGES TAB -->
    <div id="challenges" class="tab-content">
      <div class="tab-nav" style="position: static; padding: 12px 20px 0;">
        <button class="tab-btn active" onclick="switchChallengeTab('challenges-list', 0)">🎯 Challenges</button>
        <button class="tab-btn" onclick="switchChallengeTab('challenges-create', 1)">➕ Créer</button>
      </div>
      
      <div id="challenges-list" class="challenge-tab-content active" style="padding: 20px;"></div>
      
      <div id="challenges-create" class="challenge-tab-content" style="padding: 20px;">
        <div class="content" style="max-width: 600px;">
          <div style="background: var(--bg-raised); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px;">
            <h3 style="font-family: 'Press Start 2P', cursive; font-size: 13px; color: var(--primary); margin-bottom: 12px; text-shadow: 1px 1px 0 var(--accent-gold);">➕ Créer un Challenge</h3>
            <div style="margin-bottom: 12px;">
              <label style="display: block; font-size: 12px; color: var(--primary); margin-bottom: 6px; font-weight: 600;">👤 Ton nom</label>
              <input type="text" id="challenge-creator" placeholder="Écris ton nom..." style="width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
              <label style="display: block; font-size: 12px; color: var(--primary); margin-bottom: 6px; font-weight: 600;">📝 Description</label>
              <textarea id="challenge-desc" placeholder="Décris ton challenge..." style="width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; min-height: 80px; font-family: inherit;"></textarea>
            </div>
            <div style="margin-bottom: 12px;">
              <label style="display: block; font-size: 12px; color: var(--primary); margin-bottom: 6px; font-weight: 600;">📸 Type</label>
              <select id="challenge-type" style="width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit;">
                <option value="photo">📸 Photo</option>
                <option value="video">📹 Vidéo</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="createChallenge()" style="width: 100%;">✨ PUBLIER</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- DEEZER -->
<button class="deezer-tab" onclick="toggleDeezer()">🎵</button>
<div class="deezer-panel" id="deezerPanel">
  <div class="deezer-header">
    <h3>🎵 MUSIQUE</h3>
    <button class="deezer-close" onclick="toggleDeezer()">✕</button>
  </div>
  <div class="deezer-content">
    <iframe title="deezer-widget" src="https://widget.deezer.com/widget/dark/playlist/15298797043" width="100%" height="100%" frameborder="0" allowtransparency="true" allow="encrypted-media; clipboard-write"></iframe>
  </div>
</div>

// ============== DATA ==============

let inscriptions = {};
let selectedDay = 0;

// ============== INIT ==============
window.addEventListener('DOMContentLoaded', () => {
  loadData();
  renderPlanning();
  renderDaySelector();
  displayDay(0);
  initChallenges();
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function switchTab(tab, idx) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(tab).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function loadData() {
  const saved = localStorage.getItem('saraillon_inscriptions');
  inscriptions = saved ? JSON.parse(saved) : {};
  
  const savedPlanning = localStorage.getItem('saraillon_planning');
  if (savedPlanning) {
    planningData = JSON.parse(savedPlanning);
  }
}

function saveInscriptions() {
  localStorage.setItem('saraillon_inscriptions', JSON.stringify(inscriptions));
}

// ============== PLANNING ==============
function renderPlanning() {
  const html = planningData.map((day, dayIdx) => `
    <div class="day-card">
      <div class="day-title">${day.jour}</div>
      ${day.activities.map((activity, actIdx) => `
        <div class="activity">
          <div class="activity-name">
            ${activity.emoji} 
            <input type="text" value="${activity.nom}" onchange="updateActivity(${dayIdx}, ${actIdx}, 'nom', this.value)" style="background: transparent; border: none; border-bottom: 1px dotted var(--primary); padding: 0; color: inherit; font-weight: inherit; font-size: inherit; width: auto; min-width: 200px;">
          </div>
          <div class="info-row">
            <div class="info-item">
              <div class="info-label">⏰ Horaires</div>
              <input type="text" value="${activity.horaires}" onchange="updateActivity(${dayIdx}, ${actIdx}, 'horaires', this.value)" style="background: transparent; border: none; border-bottom: 1px dotted var(--primary); padding: 2px; color: inherit; font-size: 13px; font-weight: 600; width: 100%;">
            </div>
            <div class="info-item">
              <div class="info-label">📍 Lieu</div>
              <input type="text" value="${activity.lieu}" onchange="updateActivity(${dayIdx}, ${actIdx}, 'lieu', this.value)" style="background: transparent; border: none; border-bottom: 1px dotted var(--primary); padding: 2px; color: inherit; font-size: 13px; font-weight: 600; width: 100%;">
            </div>
            <div class="info-item">
              <div class="info-label">🍽️ Repas</div>
              <input type="text" value="${activity.repas}" onchange="updateActivity(${dayIdx}, ${actIdx}, 'repas', this.value)" style="background: transparent; border: none; border-bottom: 1px dotted var(--primary); padding: 2px; color: inherit; font-size: 13px; font-weight: 600; width: 100%;">
            </div>
            <div class="info-item">
              <div class="info-label">🎒 À apporter</div>
              <input type="text" value="${activity.apporter}" onchange="updateActivity(${dayIdx}, ${actIdx}, 'apporter', this.value)" style="background: transparent; border: none; border-bottom: 1px dotted var(--primary); padding: 2px; color: inherit; font-size: 13px; font-weight: 600; width: 100%;">
            </div>
          </div>
          ${activity.inscription ? `
            <div style="background: var(--bg-sunken); padding: 10px; border-radius: 8px; border: 1px solid var(--border);">
              <div class="info-label">📝 Inscription requise</div>
              <div class="button-group">
                <a href="${activity.link}" target="_blank" class="btn btn-primary">S'inscrire</a>
                <button class="btn" id="inscrit-${dayIdx}-${actIdx}" style="background: var(--bg-sunken); color: var(--primary);" onclick="toggleInscription(${dayIdx}, ${actIdx})">❌ Non inscrit</button>
              </div>
            </div>
          ` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
  
  document.getElementById('planning-content').innerHTML = html;
  updateInscriptionButtons();
}

function updateActivity(dayIdx, actIdx, field, value) {
  planningData[dayIdx].activities[actIdx][field] = value;
  localStorage.setItem('saraillon_planning', JSON.stringify(planningData));
}

function toggleInscription(dayIdx, actIdx) {
  const key = `${dayIdx}-${actIdx}`;
  inscriptions[key] = !inscriptions[key];
  saveInscriptions();
  updateInscriptionButtons();
  displayDay(selectedDay);
}

function updateInscriptionButtons() {
  Object.keys(inscriptions).forEach(key => {
    const btn = document.getElementById(`inscrit-${key}`);
    if (btn) {
      if (inscriptions[key]) {
        btn.textContent = '✅ Inscrit';
        btn.style.background = 'var(--accent-gold)';
        btn.style.color = 'white';
      } else {
        btn.textContent = '❌ Non inscrit';
        btn.style.background = 'var(--bg-sunken)';
        btn.style.color = 'var(--primary)';
      }
    }
  });
}

function isInscribedOnDay(dayIdx) {
  for (let actIdx = 0; actIdx < planningData[dayIdx].activities.length; actIdx++) {
    if (inscriptions[`${dayIdx}-${actIdx}`]) {
      return true;
    }
  }
  return false;
}

// ============== CORVEES ==============
function renderDaySelector() {
  const html = planningData.map((day, idx) => `
    <button class="day-btn ${idx === 0 ? 'active' : ''}" onclick="selectDay(${idx})">${day.jour.substring(0, 3)}</button>
  `).join('');
  document.getElementById('day-selector').innerHTML = html;
}

function selectDay(idx) {
  selectedDay = idx;
  displayDay(idx);
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.day-btn')[idx].classList.add('active');
}

function displayDay(idx) {
  const available = PARTICIPANTS.filter((_, pIdx) => !isInscribedOnDay(idx));
  let html = `<div style="text-align: center; padding: 20px; color: var(--primary-light); margin-bottom: 20px;">`;
  html += `<strong>${planningData[idx].jour}</strong><br>`;
  html += `${available.length} personne${available.length > 1 ? 's' : ''} disponible${available.length > 1 ? 's' : ''} pour les corvées`;
  html += `</div>`;
  document.getElementById('chores-display').innerHTML = html;
}

function spinRoulette() {
  const available = PARTICIPANTS.filter((_, pIdx) => !isInscribedOnDay(selectedDay));
  
  if (available.length === 0) {
    document.getElementById('chores-display').innerHTML = '<div class="empty-msg">🎉 Tout le monde est inscrit à une activité ce jour! Pas de corvées!</div>';
    return;
  }

  const choreCount = Math.min(CHORES.length, available.length);
  const selectedChores = [];
  const usedIndices = new Set();

  for (let i = 0; i < choreCount; i++) {
    let choreIdx;
    do {
      choreIdx = Math.floor(Math.random() * CHORES.length);
    } while (usedIndices.has(choreIdx));
    usedIndices.add(choreIdx);
    selectedChores.push(CHORES[choreIdx]);
  }

  let html = '<div style="text-align: center; margin-bottom: 20px;"><strong>🎯 CORVÉES DU JOUR</strong></div>';
  selectedChores.forEach((chore, idx) => {
    html += `
      <div class="chore-item">
        <div class="chore-emoji">${chore.emoji}</div>
        <div class="chore-info">
          <div class="chore-name">${chore.name}</div>
          <div class="chore-person">👤 ${available[idx]}</div>
        </div>
      </div>
    `;
  });

  document.getElementById('chores-display').innerHTML = html;
}

// ============== SURPRISE ==============
function revealSurprise() {
  if (document.getElementById('surprise-code').value.toUpperCase() === 'MAGIA') {
    document.getElementById('surprise-content').innerHTML = `
      <div style="background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink)); color: white; border-radius: 12px; padding: 20px; text-align: center; margin-top: 16px;">
        <h2 style="font-family: 'Press Start 2P', cursive; font-size: 16px; margin-bottom: 12px;">🎉 SURPRISE!</h2>
        <p style="font-size: 13px; line-height: 1.8;">
          <strong>📍 Dimanche - Lieu secret</strong><br>
          <strong>⏰ 10h30 – 00h00</strong><br>
          <strong>🎊 Thème: Mystère et magie</strong><br>
          <strong>🍽️ Déjeuner + Dîner</strong><br>
          <br>✨ Prépare-toi à l'inattendu! ✨
        </p>
      </div>
    `;
  } else {
    alert('❌ Code incorrect');
  }
}

// ============== CHALLENGES ==============
let challenges = [];

function initChallenges() {
  const saved = localStorage.getItem('saraillon_challenges');
  challenges = saved ? JSON.parse(saved) : [
    {
      id: 1,
      creator: "DELPHINE",
      type: "photo",
      description: "Premier coucher de soleil à la plage! 🌅",
      likes: 5,
      comments: [
        { author: "CHUNFEI", text: "Trop belle! 😍" }
      ],
      liked: false
    }
  ];
  renderChallenges();
}

function renderChallenges() {
  const html = challenges.map(ch => `
    <div style="background: var(--bg-raised); border: 1.5px solid var(--accent-pink); border-radius: 12px; padding: 16px; margin-bottom: 14px;">
      <div style="display: flex; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px;">
          ${ch.creator.charAt(0)}
        </div>
        <div>
          <div style="font-weight: 700; color: var(--primary); font-size: 13px;">${ch.creator}</div>
          <div style="font-size: 11px; color: var(--primary-light); text-transform: uppercase;">${ch.type === 'video' ? '📹 Vidéo' : '📸 Photo'}</div>
        </div>
      </div>
      <div style="margin-bottom: 12px; font-size: 14px; line-height: 1.5; color: var(--primary);">${ch.description}</div>
      <div style="display: flex; gap: 10px; margin-bottom: 12px;">
        <button class="btn" style="background: ${ch.liked ? 'var(--accent-pink)' : 'var(--bg-sunken)'}; color: ${ch.liked ? 'white' : 'var(--primary)'}; flex: 1;" onclick="toggleLike(${ch.id})">❤️ ${ch.likes}</button>
        <button class="btn" style="background: var(--bg-sunken); color: var(--primary); flex: 1;" onclick="toggleComments(${ch.id})">💬 ${ch.comments.length}</button>
      </div>
      <div id="comments-${ch.id}" style="display: none; background: var(--bg-sunken); padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
        ${ch.comments.map(c => `
          <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); font-size: 12px;">
            <strong style="color: var(--primary);">${c.author}:</strong>
            <div style="color: var(--primary-soft); margin-top: 2px;">${c.text}</div>
          </div>
        `).join('')}
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <input type="text" id="comment-input-${ch.id}" placeholder="Commentaire..." style="flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px;">
          <button class="btn btn-primary" onclick="addComment(${ch.id})" style="padding: 8px 12px;">📤</button>
        </div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('challenges-list').innerHTML = html || '<div style="text-align: center; padding: 40px; color: var(--primary-light);">Aucun challenge pour le moment 😴</div>';
}

function createChallenge() {
  const creator = document.getElementById('challenge-creator').value;
  const type = document.getElementById('challenge-type').value;
  const desc = document.getElementById('challenge-desc').value;
  
  if (!creator || !desc) {
    alert('Remplis tous les champs!');
    return;
  }

  challenges.push({
    id: Date.now(),
    creator: creator.toUpperCase(),
    type,
    description: desc,
    likes: 0,
    comments: [],
    liked: false
  });

  localStorage.setItem('saraillon_challenges', JSON.stringify(challenges));
  document.getElementById('challenge-creator').value = '';
  document.getElementById('challenge-desc').value = '';
  switchChallengeTab('challenges-list', 0);
  renderChallenges();
}

function toggleLike(id) {
  const ch = challenges.find(c => c.id === id);
  if (ch) {
    ch.liked = !ch.liked;
    ch.likes += ch.liked ? 1 : -1;
    localStorage.setItem('saraillon_challenges', JSON.stringify(challenges));
    renderChallenges();
  }
}

function toggleComments(id) {
  const el = document.getElementById('comments-' + id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function addComment(id) {
  const input = document.getElementById('comment-input-' + id);
  if (input && input.value.trim()) {
    const ch = challenges.find(c => c.id === id);
    if (ch) {
      ch.comments.push({ author: 'TOI', text: input.value });
      localStorage.setItem('saraillon_challenges', JSON.stringify(challenges));
      input.value = '';
      renderChallenges();
    }
  }
}

function switchChallengeTab(tabId, idx) {
  document.querySelectorAll('.challenge-tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  const btns = document.querySelectorAll('#challenges .tab-btn');
  btns.forEach(b => b.classList.remove('active'));
  btns[idx].classList.add('active');
}

// ============== DEEZER ==============
function toggleDeezer() {
  document.getElementById('deezerPanel').classList.toggle('open');
}
</script>
